<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tageskarte</title>
<style>
:root {
  --font: -apple-system,'SamsungOne','Samsung Sharp Sans',BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --r-card:28px; --r-btn:50px; --r-input:16px; --r-chip:50px;
  --t:0.22s cubic-bezier(0.3,0,0.1,1);
  --accent:#5B8DEF; --accent-press:#3B6DCD; --accent-subtle:rgba(91,141,239,0.12);
}
[data-theme="dark"] {
  --bg:#0d0d0d; --surface:#1f1f1f; --surface2:#2a2a2a; --surface3:#333;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text-primary:#f0f0f0; --text-secondary:#9e9e9e; --text-tertiary:#5e5e5e; --icon:#c8c8c8;
  --divider:rgba(255,255,255,0.06); --danger:#ff6b6b; --danger-subtle:rgba(255,107,107,0.12);
  --success:#52c87a; --header-bg:rgba(13,13,13,0.88); --chip-bg:#2a2a2a;
  --chip-active:rgba(91,141,239,0.18); --shadow:0 2px 20px rgba(0,0,0,0.6);
  --shadow-card:0 4px 32px rgba(0,0,0,0.5); color-scheme:dark;
}
[data-theme="light"] {
  --bg:#f4f4f4; --surface:#fff; --surface2:#f9f9f9; --surface3:#f0f0f0;
  --border:rgba(0,0,0,0.06); --border2:rgba(0,0,0,0.1);
  --text-primary:#1a1a1a; --text-secondary:#6e6e6e; --text-tertiary:#aaa; --icon:#444;
  --divider:rgba(0,0,0,0.06); --danger:#d93025; --danger-subtle:rgba(217,48,37,0.1);
  --success:#1a8c46; --header-bg:rgba(244,244,244,0.88); --chip-bg:#ebebeb;
  --chip-active:rgba(91,141,239,0.14); --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-card:0 4px 20px rgba(0,0,0,0.08); color-scheme:light;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background var(--t),color var(--t);}

/* ── App Bar ── */
.app-bar{position:sticky;top:0;z-index:200;background:var(--header-bg);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;transition:background var(--t);}
.app-bar-title{font-size:1.15rem;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em;}
.app-bar-title span{font-weight:400;color:var(--text-secondary);font-size:0.85rem;margin-left:6px;}
.icon-btn-bar{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--icon);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t);-webkit-tap-highlight-color:transparent;}
.icon-btn-bar:hover{background:var(--surface3);}
.icon-btn-bar:active{transform:scale(0.92);}

/* ── Tab Bar ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:6px 12px;gap:4px;transition:background var(--t);position:sticky;top:60px;z-index:100;}
.tab-btn{flex:1;padding:9px 12px;border:none;border-radius:var(--r-chip);background:transparent;color:var(--text-secondary);font-family:var(--font);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all var(--t);-webkit-tap-highlight-color:transparent;}
.tab-btn.active{background:var(--accent-subtle);color:var(--accent);font-weight:600;}
.tab-btn:hover:not(.active){background:var(--surface3);}

/* ── Swipe Container ── */
.swipe-container{overflow:hidden;width:100%;}
.swipe-track{display:flex;width:400%;transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);will-change:transform;}
.swipe-track.no-transition{transition:none!important;}

/* ── Pages ── */
.page{width:25%;flex-shrink:0;min-height:calc(100vh - 112px);}
.page-inner{max-width:960px;margin:0 auto;padding:16px 16px 80px;}

/* ── Section Label ── */
.section-label{font-size:0.72rem;font-weight:600;color:var(--accent);letter-spacing:0.08em;text-transform:uppercase;padding:20px 4px 8px;}

/* ── Today Hero ── */
.today-hero{background:var(--surface);border-radius:var(--r-card);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-card);transition:background var(--t);margin-bottom:12px;position:relative;cursor:pointer;}
.today-hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.today-hero-empty{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--surface2);color:var(--text-tertiary);cursor:default;}
.today-hero-empty .eicon{font-size:2.2rem;opacity:0.4;}
.today-hero-empty p{font-size:0.85rem;}
.today-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#fff;font-size:0.7rem;font-weight:700;letter-spacing:0.06em;padding:3px 10px;border-radius:var(--r-chip);position:absolute;top:14px;left:14px;}
.tomorrow-chip{background:#7b5ea7;}
.today-hero-info{padding:16px 20px 20px;}
.today-hero-date{font-size:0.75rem;color:var(--text-secondary);font-weight:500;margin-bottom:2px;}
.today-hero-label{font-size:1.05rem;font-weight:700;color:var(--text-primary);}

/* ── Stats Row ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px;text-align:center;transition:background var(--t);}
.stat-num{font-size:1.6rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:0.7rem;color:var(--text-secondary);font-weight:500;}

/* ── Upload Card ── */
.upload-card{background:var(--surface);border-radius:var(--r-card);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);transition:background var(--t);}
.drop-zone{border:2px dashed var(--border2);border-radius:20px;padding:36px 20px;text-align:center;cursor:pointer;position:relative;background:var(--surface2);transition:all var(--t);}
.drop-zone.drag-over,.drop-zone:hover{border-color:var(--accent);background:var(--accent-subtle);}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:2rem;margin-bottom:8px;}
.drop-zone p{color:var(--text-secondary);font-size:0.82rem;line-height:1.6;}
.drop-zone p strong{color:var(--text-primary);font-weight:600;}
.drop-hint{font-size:0.7rem;color:var(--text-tertiary);margin-top:2px;}
.preview-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:14px;margin-top:12px;display:none;border:1px solid var(--border);}
.field-wrap{margin-top:14px;}
.field-label{display:block;font-size:0.72rem;font-weight:600;color:var(--text-secondary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;padding-left:4px;}
input[type="date"]{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text-primary);padding:12px 16px;border-radius:var(--r-input);font-family:var(--font);font-size:0.9rem;outline:none;transition:border-color var(--t);color-scheme:inherit;}
input[type="date"]:focus{border-color:var(--accent);}
.btn-primary{width:100%;margin-top:14px;background:var(--accent);color:#fff;border:none;padding:15px;border-radius:var(--r-btn);font-family:var(--font);font-size:0.92rem;font-weight:600;cursor:pointer;transition:background var(--t),transform var(--t),opacity var(--t);-webkit-tap-highlight-color:transparent;}
.btn-primary:hover{background:var(--accent-press);}
.btn-primary:active{transform:scale(0.97);}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none;}

/* ── Gallery ── */
.gallery-bar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:4px 0 12px;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:var(--chip-bg);border:1px solid var(--border2);color:var(--text-secondary);padding:6px 14px;border-radius:var(--r-chip);font-family:var(--font);font-size:0.75rem;font-weight:500;cursor:pointer;transition:all var(--t);-webkit-tap-highlight-color:transparent;}
.chip.active{background:var(--chip-active);border-color:var(--accent);color:var(--accent);font-weight:600;}
.chip:hover:not(.active){background:var(--surface3);}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none;}
input.search-input{background:var(--surface);border:1px solid var(--border2);color:var(--text-primary);padding:8px 12px 8px 34px;border-radius:var(--r-chip);font-family:var(--font);font-size:0.78rem;outline:none;width:160px;transition:all var(--t);color-scheme:inherit;}
input.search-input:focus{border-color:var(--accent);width:200px;}

/* ── Cards Grid ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.meal-card{background:var(--surface);border-radius:22px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform var(--t),box-shadow var(--t),border-color var(--t);-webkit-tap-highlight-color:transparent;}
.meal-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-card);border-color:var(--border2);}
.meal-card:active{transform:scale(0.97);}
.meal-card.today-card{border-color:var(--accent);}
.card-img-wrap{position:relative;overflow:hidden;aspect-ratio:16/9;background:var(--surface2);}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease;}
.meal-card:hover .card-img-wrap img{transform:scale(1.04);}
.card-date-pill{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);color:#fff;font-size:0.68rem;font-weight:500;padding:3px 10px;border-radius:50px;}
.card-today-pill{position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;font-size:0.65rem;font-weight:700;letter-spacing:0.06em;padding:3px 10px;border-radius:50px;text-transform:uppercase;}
.card-footer{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.card-weekday{font-size:0.78rem;font-weight:500;color:var(--text-secondary);}
.card-action-row{display:flex;gap:4px;}
.icon-btn-sm{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface3);color:var(--icon);font-size:0.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);-webkit-tap-highlight-color:transparent;}
.icon-btn-sm:hover{background:var(--surface2);}
.icon-btn-sm.del:hover{background:var(--danger-subtle);color:var(--danger);}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-tertiary);}
.empty-state .eicon{font-size:2.5rem;margin-bottom:12px;opacity:0.3;}
.empty-state p{font-size:0.85rem;}

/* ── Calendar ── */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cal-month-title{font-size:1rem;font-weight:600;color:var(--text-primary);}
.cal-nav-row{display:flex;gap:6px;}
.icon-btn-nav{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--icon);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);}
.icon-btn-nav:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day-lbl{text-align:center;font-size:0.65rem;font-weight:600;color:var(--text-tertiary);letter-spacing:0.08em;padding-bottom:6px;border-bottom:1px solid var(--divider);}
.cal-cell{aspect-ratio:1;border-radius:12px;border:1px solid transparent;overflow:hidden;position:relative;background:var(--surface2);transition:all var(--t);}
.cal-cell.has-entry{cursor:pointer;border-color:var(--border);}
.cal-cell.has-entry:hover{border-color:var(--accent);transform:scale(1.06);z-index:2;box-shadow:var(--shadow-card);}
.cal-cell.is-today{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent);}
.cal-cell.empty-cell{background:transparent;border-color:transparent;}
.cal-cell img{width:100%;height:100%;object-fit:cover;display:block;}
.cal-num{position:absolute;bottom:4px;left:6px;font-size:0.65rem;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.9);}
.cal-num-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.75rem;font-weight:500;color:var(--text-tertiary);}

/* ── Swipe hint dots ── */
.swipe-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 0;position:fixed;bottom:16px;left:0;right:0;pointer-events:none;}
.swipe-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all var(--t);}
.swipe-dot.active{width:20px;border-radius:3px;background:var(--accent);}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.lightbox.open{display:flex;}
.lb-inner{max-width:1200px;width:100%;position:relative;animation:lbIn 0.2s ease;}
@keyframes lbIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
.lb-inner img{width:100%;border-radius:20px;display:block;box-shadow:0 24px 80px rgba(0,0,0,0.7);}
.lb-date{text-align:center;margin-top:14px;font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.7);}
.lb-close{position:absolute;top:-14px;right:-14px;width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--text-primary);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all var(--t);}
.lb-close:hover{background:var(--danger-subtle);color:var(--danger);}

/* ── Toast ── */
.toast{position:fixed;bottom:52px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);color:var(--text-primary);padding:11px 22px;border-radius:50px;font-family:var(--font);font-size:0.82rem;font-weight:500;z-index:600;transition:transform 0.28s cubic-bezier(0.3,0,0,1);pointer-events:none;box-shadow:var(--shadow-card);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--success);color:var(--success);}
.toast.error{border-color:var(--danger);color:var(--danger);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .stats-row{gap:8px;}
  .stat-num{font-size:1.3rem;}
}
@media(max-width:400px){.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- App Bar -->
<div class="app-bar">
  <div class="app-bar-title">Tageskarte <span>Betriebsrestaurant</span></div>
  <div><button class="icon-btn-bar" id="themeToggle" aria-label="Theme wechseln"></button></div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" data-page="0">Heute</button>
  <button class="tab-btn" data-page="1">＋ Eintrag</button>
  <button class="tab-btn" data-page="2">Galerie</button>
  <button class="tab-btn" data-page="3">Kalender</button>
</div>

<!-- Swipe Container -->
<div class="swipe-container" id="swipeContainer">
  <div class="swipe-track" id="swipeTrack">

    <!-- PAGE 0: HEUTE -->
    <div class="page" id="page-today">
      <div class="page-inner">
        <div class="section-label" id="todayLabel">Tageskarte</div>
        <div class="today-hero" id="todayHero">
          <div class="today-hero-empty">
            <div class="eicon">🍽️</div>
            <p>Kein Eintrag vorhanden</p>
          </div>
        </div>
        <div class="section-label">Übersicht</div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Gesamt</div></div>
          <div class="stat-card"><div class="stat-num" id="statMonth">0</div><div class="stat-lbl">Dieser Monat</div></div>
          <div class="stat-card"><div class="stat-num" id="statWeek">0</div><div class="stat-lbl">Diese Woche</div></div>
        </div>
      </div>
    </div>

    <!-- PAGE 1: EINTRAG -->
    <div class="page" id="page-upload">
      <div class="page-inner">
        <div class="section-label">Neuen Eintrag hinzufügen</div>
        <div class="upload-card">
          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*">
            <div class="drop-icon">📷</div>
            <p><strong>Bild auswählen oder hierher ziehen</strong></p>
            <p class="drop-hint">Empfohlen: 1920 × 1080 px</p>
            <img class="preview-thumb" id="previewThumb" alt="Vorschau">
          </div>
          <div class="field-wrap">
            <label class="field-label" for="dateInput">Datum</label>
            <input type="date" id="dateInput">
          </div>
          <button class="btn-primary" id="saveBtn" disabled>Eintrag speichern</button>
        </div>
      </div>
    </div>

    <!-- PAGE 2: GALERIE -->
    <div class="page" id="page-gallery">
      <div class="page-inner">
        <div class="gallery-bar">
          <div class="chip-row">
            <button class="chip active" data-filter="all">Alle</button>
            <button class="chip" data-filter="week">Diese Woche</button>
            <button class="chip" data-filter="month">Dieser Monat</button>
          </div>
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" type="text" placeholder="Datum suchen…" id="searchInput">
          </div>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
      </div>
    </div>

    <!-- PAGE 3: KALENDER -->
    <div class="page" id="page-calendar">
      <div class="page-inner">
        <div class="cal-header">
          <div class="cal-month-title" id="calMonthLabel"></div>
          <div class="cal-nav-row">
            <button class="icon-btn-nav" id="calPrev">‹</button>
            <button class="icon-btn-nav" id="calNext">›</button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

  </div><!-- /swipe-track -->
</div><!-- /swipe-container -->

<!-- Swipe dots -->
<div class="swipe-dots" id="swipeDots">
  <div class="swipe-dot active"></div>
  <div class="swipe-dot"></div>
  <div class="swipe-dot"></div>
  <div class="swipe-dot"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" id="lbClose">✕</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-date" id="lbDate"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// IndexedDB
// ══════════════════════════════════════════════════════════════════
const DB_NAME='tageskarte_db', DB_VER=1, STORE='entries';
let db;
function initDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      if(!e.target.result.objectStoreNames.contains(STORE))
        e.target.result.createObjectStore(STORE,{keyPath:'date'});
    };
    req.onsuccess=e=>{db=e.target.result;res();};
    req.onerror=()=>rej(req.error);
  });
}
const dbPut=e=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(e);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
const dbGetAll=()=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbDelete=d=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(d);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});

// ══════════════════════════════════════════════════════════════════
// Time Logic — ab 14:00 Uhr wird der nächste Werktag angezeigt
// ══════════════════════════════════════════════════════════════════
function getDisplayDate() {
  const now = new Date();
  const hour = now.getHours();
  if (hour >= 14) {
    // Next working day (skip weekend)
    const next = new Date(now);
    next.setDate(next.getDate() + 1);
    while (next.getDay() === 0 || next.getDay() === 6) {
      next.setDate(next.getDate() + 1);
    }
    return next.toISOString().split('T')[0];
  }
  return now.toISOString().split('T')[0];
}

function isTomorrow() {
  const now = new Date();
  return now.getHours() >= 14;
}

const todayStr = () => new Date().toISOString().split('T')[0];

// ══════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════
let entries=[], currentFilter='all', calYear, calMonth, currentPage=0;
const nowDate=new Date(); calYear=nowDate.getFullYear(); calMonth=nowDate.getMonth();
const PAGE_COUNT=4;

// ══════════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════════
const formatDate=s=>new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
const formatDateShort=s=>new Date(s+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
const weekday=s=>new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long'});
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.className='toast',2800);}
const fileToBase64=f=>new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);});

// ══════════════════════════════════════════════════════════════════
// Load
// ══════════════════════════════════════════════════════════════════
async function loadAll(){
  entries=await dbGetAll();
  entries.sort((a,b)=>b.date.localeCompare(a.date));
  updateToday(); updateStats(); renderGallery(); renderCalendar();
}

// ══════════════════════════════════════════════════════════════════
// Today
// ══════════════════════════════════════════════════════════════════
function updateToday(){
  const displayDate = getDisplayDate();
  const showingTomorrow = isTomorrow();
  const entry = entries.find(e=>e.date===displayDate);
  const hero = document.getElementById('todayHero');
  const label = document.getElementById('todayLabel');

  label.textContent = showingTomorrow ? 'Morgen' : 'Heute';

  if(entry){
    const chipText = showingTomorrow ? '→ Morgen' : '● Heute';
    const chipClass = showingTomorrow ? 'today-chip tomorrow-chip' : 'today-chip';
    hero.style.cursor='pointer';
    hero.onclick=()=>openLightbox(displayDate);
    hero.innerHTML=`
      <div class="${chipClass}">${chipText}</div>
      <img class="today-hero-img" src="${entry.imageData}" alt="" loading="lazy">
      <div class="today-hero-info">
        <div class="today-hero-date">${formatDate(displayDate)}</div>
        <div class="today-hero-label">Tageskarte</div>
      </div>`;
  } else {
    hero.style.cursor='default';
    hero.onclick=null;
    const msg = showingTomorrow
      ? 'Noch kein Eintrag für morgen'
      : 'Kein Eintrag für heute';
    hero.innerHTML=`
      <div class="today-hero-empty">
        <div class="eicon">🍽️</div>
        <p>${msg}</p>
      </div>`;
  }
}

// ══════════════════════════════════════════════════════════════════
// Stats
// ══════════════════════════════════════════════════════════════════
function updateStats(){
  const t=todayStr(),[ty,tm]=t.split('-');
  const ws=new Date(nowDate); ws.setDate(nowDate.getDate()-(nowDate.getDay()===0?6:nowDate.getDay()-1)); ws.setHours(0,0,0,0);
  document.getElementById('statTotal').textContent=entries.length;
  document.getElementById('statMonth').textContent=entries.filter(e=>e.date.startsWith(ty+'-'+tm)).length;
  document.getElementById('statWeek').textContent=entries.filter(e=>new Date(e.date+'T12:00:00')>=ws).length;
}

// ══════════════════════════════════════════════════════════════════
// Upload
// ══════════════════════════════════════════════════════════════════
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
      previewThumb=document.getElementById('previewThumb'),dateInput=document.getElementById('dateInput'),
      saveBtn=document.getElementById('saveBtn');
let currentFile=null;
dateInput.value=todayStr();

function handleFile(f){if(!f||!f.type.startsWith('image/'))return;currentFile=f;previewThumb.src=URL.createObjectURL(f);previewThumb.style.display='block';checkSave();}
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
dateInput.addEventListener('input',checkSave);
function checkSave(){saveBtn.disabled=!(currentFile&&dateInput.value);}

saveBtn.addEventListener('click',async()=>{
  if(!currentFile||!dateInput.value)return;
  saveBtn.disabled=true; saveBtn.textContent='Wird gespeichert…';
  try{
    await dbPut({date:dateInput.value,imageData:await fileToBase64(currentFile)});
    showToast('✓ Gespeichert','success');
    currentFile=null; previewThumb.style.display='none'; previewThumb.src='';
    dateInput.value=todayStr(); saveBtn.textContent='Eintrag speichern'; saveBtn.disabled=true;
    await loadAll(); switchPage(0);
  }catch{
    showToast('Fehler beim Speichern','error');
    saveBtn.disabled=false; saveBtn.textContent='Eintrag speichern';
  }
});

// ══════════════════════════════════════════════════════════════════
// Gallery
// ══════════════════════════════════════════════════════════════════
function renderGallery(){
  const grid=document.getElementById('cardsGrid'),
        search=document.getElementById('searchInput').value.toLowerCase(),
        t=todayStr(), now2=new Date();
  let f=[...entries];
  if(currentFilter==='week'){const ws=new Date(now2);ws.setDate(now2.getDate()-(now2.getDay()===0?6:now2.getDay()-1));ws.setHours(0,0,0,0);f=f.filter(e=>new Date(e.date+'T12:00:00')>=ws);}
  else if(currentFilter==='month'){const[y,m]=t.split('-');f=f.filter(e=>e.date.startsWith(y+'-'+m));}
  if(search)f=f.filter(e=>formatDate(e.date).toLowerCase().includes(search)||e.date.includes(search));
  if(!f.length){grid.innerHTML=`<div class="empty-state"><div class="eicon">🍽️</div><p>Noch keine Einträge vorhanden.</p></div>`;return;}
  grid.innerHTML=f.map(e=>`
    <div class="meal-card${e.date===t?' today-card':''}" data-date="${e.date}">
      <div class="card-img-wrap">
        <img src="${e.imageData}" alt="${e.date}" loading="lazy">
        <div class="card-date-pill">${formatDateShort(e.date)}</div>
        ${e.date===t?'<div class="card-today-pill">Heute</div>':''}
      </div>
      <div class="card-footer">
        <span class="card-weekday">${weekday(e.date)}</span>
        <div class="card-action-row">
          <button class="icon-btn-sm" title="Vollbild" onclick="openLightbox('${e.date}',event)">⤢</button>
          <button class="icon-btn-sm del" title="Löschen" onclick="deleteEntry('${e.date}',event)">✕</button>
        </div>
      </div>
    </div>`).join('');
  grid.querySelectorAll('.meal-card').forEach(c=>c.addEventListener('click',()=>openLightbox(c.dataset.date)));
}
document.getElementById('searchInput').addEventListener('input',renderGallery);
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active'); currentFilter=c.dataset.filter; renderGallery();
}));

// ══════════════════════════════════════════════════════════════════
// Delete
// ══════════════════════════════════════════════════════════════════
async function deleteEntry(date,e){
  if(e)e.stopPropagation();
  if(!confirm(`Eintrag für ${formatDateShort(date)} wirklich löschen?`))return;
  await dbDelete(date); showToast('Eintrag gelöscht'); await loadAll();
}

// ══════════════════════════════════════════════════════════════════
// Calendar
// ══════════════════════════════════════════════════════════════════
document.getElementById('calPrev').addEventListener('click',()=>{if(--calMonth<0){calMonth=11;calYear--;}renderCalendar();});
document.getElementById('calNext').addEventListener('click',()=>{if(++calMonth>11){calMonth=0;calYear++;}renderCalendar();});

function renderCalendar(){
  document.getElementById('calMonthLabel').textContent=
    new Date(calYear,calMonth,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html=days.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  let sd=new Date(calYear,calMonth,1).getDay(); sd=sd===0?6:sd-1;
  const dim=new Date(calYear,calMonth+1,0).getDate(), t=todayStr(), map={};
  entries.forEach(e=>map[e.date]=e);
  for(let i=0;i<sd;i++)html+=`<div class="cal-cell empty-cell"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry=map[ds], isT=ds===t;
    if(entry)
      html+=`<div class="cal-cell has-entry${isT?' is-today':''}" onclick="openLightbox('${ds}')" title="${formatDateShort(ds)}"><img src="${entry.imageData}" alt="${ds}" loading="lazy"><div class="cal-num">${d}</div></div>`;
    else
      html+=`<div class="cal-cell${isT?' is-today':''}"><span class="cal-num-empty">${d}</span></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

// ══════════════════════════════════════════════════════════════════
// Lightbox
// ══════════════════════════════════════════════════════════════════
function openLightbox(date,e){
  if(e)e.stopPropagation();
  const entry=entries.find(en=>en.date===date);
  if(!entry)return;
  document.getElementById('lbImg').src=entry.imageData;
  document.getElementById('lbDate').textContent=formatDate(date);
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lbClose').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lightbox').classList.remove('open');});

// ══════════════════════════════════════════════════════════════════
// Swipe Navigation
// ══════════════════════════════════════════════════════════════════
const track = document.getElementById('swipeTrack');
const dots = document.querySelectorAll('.swipe-dot');
const tabs = document.querySelectorAll('.tab-btn');

function switchPage(idx, animate=true){
  if(idx<0||idx>=PAGE_COUNT)return;
  currentPage=idx;
  if(!animate) track.classList.add('no-transition');
  track.style.transform=`translateX(-${idx*25}%)`;
  if(!animate) requestAnimationFrame(()=>requestAnimationFrame(()=>track.classList.remove('no-transition')));

  // Update tabs
  tabs.forEach((b,i)=>b.classList.toggle('active',i===idx));

  // Update dots
  dots.forEach((d,i)=>{d.className='swipe-dot'+(i===idx?' active':'');});

  // Lazy render
  if(idx===2)renderGallery();
  if(idx===3)renderCalendar();
}

// Tab clicks
tabs.forEach((btn,i)=>btn.addEventListener('click',()=>switchPage(i)));

// Touch/Swipe
let touchStartX=0, touchStartY=0, touchDeltaX=0, isSwiping=false, swipeLocked=false;
const container=document.getElementById('swipeContainer');

container.addEventListener('touchstart',e=>{
  // Don't interfere if lightbox is open
  if(document.getElementById('lightbox').classList.contains('open'))return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchDeltaX=0; isSwiping=false; swipeLocked=false;
},{passive:true});

container.addEventListener('touchmove',e=>{
  if(document.getElementById('lightbox').classList.contains('open'))return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;

  // Determine scroll vs swipe direction on first significant move
  if(!swipeLocked && (Math.abs(dx)>6||Math.abs(dy)>6)){
    swipeLocked=true;
    isSwiping=Math.abs(dx)>Math.abs(dy);
  }
  if(!isSwiping)return;
  e.preventDefault();
  touchDeltaX=dx;

  // Live drag feedback
  const base=currentPage*25;
  const pct=(dx/window.innerWidth)*100;
  const newPct=base-(pct);
  track.classList.add('no-transition');
  track.style.transform=`translateX(${Math.max(0,Math.min((PAGE_COUNT-1)*25,newPct))*-1}%)`;
},{passive:false});

container.addEventListener('touchend',e=>{
  if(!isSwiping){track.classList.remove('no-transition');return;}
  track.classList.remove('no-transition');
  const threshold=50; // px
  if(touchDeltaX<-threshold&&currentPage<PAGE_COUNT-1) switchPage(currentPage+1);
  else if(touchDeltaX>threshold&&currentPage>0) switchPage(currentPage-1);
  else switchPage(currentPage); // snap back
},{passive:true});

// Keyboard navigation
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowRight')switchPage(currentPage+1);
  if(e.key==='ArrowLeft')switchPage(currentPage-1);
});

// ══════════════════════════════════════════════════════════════════
// Theme
// ══════════════════════════════════════════════════════════════════
const MOON=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const SUN=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeToggle').innerHTML=t==='dark'?MOON:SUN;localStorage.setItem('tageskarte_theme',t);}
document.getElementById('themeToggle').addEventListener('click',()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

// ══════════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════════
applyTheme(localStorage.getItem('tageskarte_theme')||'dark');
initDB().then(loadAll).catch(err=>showToast('DB-Fehler: '+err,'error'));
</script>
</body>
</html>
